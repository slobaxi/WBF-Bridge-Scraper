<!DOCTYPE html>
<html>
<head>
    <title>Tournament Boards</title>
</head>
<body>
    <h1>Boards</h1>

    <ul>
        {% for board in boards %}
        <li>
            <a href="/board/{{ board.BoardNumber }}">Board {{ board.BoardNumber }}</a>
            — {{ board.Home_Team }} vs {{ board.Visiting_Team }}
        </li>
        {% endfor %}
    </ul>

</body>
</html>
